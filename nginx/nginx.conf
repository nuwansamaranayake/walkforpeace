worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Trust Traefik (host network) and Docker bridge to forward real client IP
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Backend API upstream
    upstream api {
        server api:8000;
    }

    # Register subdomain (register.walkforpeacelk.org + localhost:80 default)
    server {
        listen 80 default_server;
        server_name register.walkforpeacelk.org register.localhost localhost;
        root /var/www/register;
        index index.html;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        location /uploads/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Verify subdomain
    server {
        listen 80;
        server_name verify.walkforpeacelk.org verify.localhost;
        root /var/www/verify;
        index index.html;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        location /uploads/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # WWW / root domain
    server {
        listen 80;
        server_name walkforpeacelk.org www.walkforpeacelk.org www.localhost;
        root /var/www/www;
        index index.html;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Admin subdomain
    server {
        listen 80;
        server_name admin.walkforpeacelk.org admin.localhost;
        root /var/www/admin;
        index index.html;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        location /uploads/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
